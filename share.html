<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>My K-Drama Years 🌸</title>
<style>
:root {
  --bg: #fdf7f4; --bg2: #fffaf8; --card: #fff;
  --border: #ecddd7; --border2: #ddd0ca;
  --text: #3a2e2e; --text2: #7a6a65; --text3: #a89890;
  --accent: #c26b6b; --accent2: #d98080;
  --star: #d4902a; --star-empty: #ddd0ca;
  --green: #5a8a6a; --green-bg: #eaf3ec;
  --blue: #4a7a9a; --blue-bg: #e8f2f8;
  --purple: #7a6a9a; --purple-bg: #f0eef8;
  --radius: 14px;
  --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: var(--font); min-height: 100vh; padding-bottom: 40px; }
.header { background: var(--card); border-bottom: 1px solid var(--border); padding: 28px 20px 22px; text-align: center; }
.header h1 { font-size: 28px; font-weight: 800; letter-spacing: -0.5px; line-height: 1.15; }
.header h1 span { color: var(--accent); }
.header .sub { color: var(--text2); font-size: 14px; margin-top: 8px; }
.stats { display: flex; justify-content: center; gap: 10px; margin: 16px 20px 0; flex-wrap: wrap; }
.stat { background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; padding: 10px 14px; min-width: 88px; text-align: center; cursor: pointer; transition: all 0.15s; user-select: none; }
.stat:hover { border-color: var(--accent2); }
.stat.on { background: var(--accent); border-color: var(--accent); }
.stat.on b, .stat.on .lbl { color: white; }
.stat b { display: block; font-size: 22px; font-weight: 800; color: var(--accent); line-height: 1; }
.stat .lbl { font-size: 11px; color: var(--text2); margin-top: 3px; }
.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 14px; padding: 16px 20px; max-width: 960px; margin: 0 auto; }
@media (max-width: 480px) { .grid { grid-template-columns: 1fr 1fr; gap: 10px; padding: 16px; } }
.card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 14px 12px; break-inside: avoid; position: relative; }
.card .heart { float: right; font-size: 16px; }
.card .title { font-weight: 700; font-size: 15px; line-height: 1.3; margin-bottom: 6px; padding-right: 4px; }
.card .stars { color: var(--star); font-size: 16px; letter-spacing: 1px; margin-bottom: 6px; min-height: 18px; }
.card .stars.empty { color: var(--star-empty); }
.card .meta { font-size: 12px; color: var(--text2); margin-bottom: 8px; }
.card .tags { display: flex; flex-wrap: wrap; gap: 4px; }
.tag { border-radius: 20px; padding: 3px 10px; font-size: 11px; font-weight: 500; }
.tag.cat { background: var(--purple-bg); color: var(--purple); }
.tag.drama { background: var(--blue-bg); color: var(--blue); }
.tag.reality { background: var(--green-bg); color: var(--green); }
.empty-state { text-align: center; padding: 60px 20px; color: var(--text2); }
.empty-state .emoji { font-size: 40px; margin-bottom: 10px; }
.foot { text-align: center; color: var(--text3); font-size: 12px; margin-top: 20px; padding: 0 20px; }
.foot a { color: var(--accent); text-decoration: none; }
#scroll-rec { position: fixed; bottom: calc(env(safe-area-inset-bottom) + 18px); right: 16px; background: var(--accent); color: white; border: none; border-radius: 24px; padding: 11px 18px; font-size: 14px; font-weight: 600; font-family: var(--font); cursor: pointer; box-shadow: 0 4px 20px rgba(194,107,107,0.4); display: flex; align-items: center; gap: 6px; z-index: 90; transition: transform 0.1s, background 0.15s; }
#scroll-rec:hover { background: var(--accent2); }
#scroll-rec:active { transform: scale(0.96); }
.recform { max-width: 600px; margin: 28px auto 0; padding: 0 20px; }
.recform h2 { font-size: 18px; font-weight: 700; margin-bottom: 4px; }
.recform .hint { font-size: 13px; color: var(--text2); margin-bottom: 12px; }
.rcard { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; }
.rfield { margin-bottom: 10px; }
.rfield label { display: block; font-size: 12px; font-weight: 600; color: var(--text2); margin-bottom: 4px; }
.rfield input, .rfield textarea { width: 100%; background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; padding: 9px 11px; font-size: 14px; font-family: var(--font); color: var(--text); outline: none; transition: border-color 0.15s; }
.rfield input:focus, .rfield textarea:focus { border-color: var(--accent2); }
.rfield textarea { min-height: 60px; resize: vertical; line-height: 1.4; }
.r-row { border-top: 1px dashed var(--border); padding-top: 10px; margin-top: 12px; }
.r-row:first-of-type { border-top: none; padding-top: 0; margin-top: 0; }
.r-row-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
.r-row-num { font-size: 12px; font-weight: 700; color: var(--accent); text-transform: uppercase; letter-spacing: 0.4px; }
.r-remove { background: none; border: none; color: var(--text3); cursor: pointer; font-size: 20px; line-height: 1; padding: 2px 8px; border-radius: 6px; display: none; }
.r-remove:hover { background: var(--accent-bg); color: var(--accent); }
.r-addmore { background: none; border: 1.5px dashed var(--border2); color: var(--text2); border-radius: 10px; padding: 10px; font-size: 13px; font-weight: 600; cursor: pointer; font-family: var(--font); width: 100%; margin: 12px 0 10px; transition: all 0.15s; }
.r-addmore:hover { border-color: var(--accent); color: var(--accent); }
.rsubmit { background: var(--accent); color: #fff; border: none; border-radius: 20px; padding: 9px 18px; font-size: 14px; font-weight: 600; cursor: pointer; font-family: var(--font); transition: background 0.15s; }
.rsubmit:hover { background: var(--accent2); }
.rsubmit:disabled { opacity: 0.5; cursor: wait; }
.rthanks { background: var(--green-bg); color: var(--green); border-radius: 8px; padding: 10px 12px; font-size: 13px; margin-top: 10px; }
.recent-recs { max-width: 600px; margin: 16px auto 0; padding: 0 20px; }
.recent-recs h3 { font-size: 13px; font-weight: 700; color: var(--text2); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 10px; }
.rrow { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 10px 12px; margin-bottom: 6px; font-size: 13px; }
.rrow b { font-weight: 700; }
.rrow .who { color: var(--accent); font-size: 12px; }
.rrow .why { color: var(--text2); margin-top: 4px; font-size: 12px; }
</style>
</head>
<body>
<div id="root"><div class="empty-state"><div class="emoji">🌸</div>Loading…</div></div>
<button id="scroll-rec" onclick="scrollToRecommend()" style="display:none" aria-label="Recommend a drama">
  <svg viewBox="0 0 24 24" width="16" height="16"><path d="M18 15l-6-6-6 6" stroke="currentColor" stroke-width="2.2" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
  Recommend
</button>
<script>
const params = new URLSearchParams(location.search);
const token = params.get('t') || location.hash.replace(/^#/,'') || '';
const API_KEY = 'kdrama_share_api';
let API = params.get('api') || localStorage.getItem(API_KEY) || '';
if (params.get('api')) localStorage.setItem(API_KEY, params.get('api'));
let DATA = null;
let currentFilter = 'all';

function fmtDate(d) {
  if (!d) return '';
  const p = d.split('-'); if (p.length !== 3) return d;
  return `${+p[1]}/${+p[2]}/${p[0].slice(2)}`;
}
function esc(s) { return String(s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function stars(r) {
  if (!r) return '<span class="stars empty">☆☆☆☆☆</span>';
  return `<span class="stars">${'★'.repeat(r)}${'☆'.repeat(5-r)}</span>`;
}

async function load() {
  if (!token) { renderError('Missing share token in the URL.'); return; }
  if (!API) { renderApiPrompt(); return; }
  try {
    const r = await fetch(API.replace(/\/$/,'') + '/api/share/' + encodeURIComponent(token));
    if (!r.ok) throw new Error('Status ' + r.status);
    DATA = await r.json();
    render();
  } catch (e) {
    renderError('Could not load this share. The link may have been revoked, or the server is waking up (try again in 30 seconds).');
  }
}

function renderApiPrompt() {
  document.getElementById('root').innerHTML = `
    <div class="header"><h1>My <span>K-Drama</span> Years 🌸</h1></div>
    <div class="empty-state">
      <div class="emoji">🔌</div>
      <p style="margin-bottom:12px">Enter the API URL to view this list:</p>
      <input id="apiIn" placeholder="https://kdrama-tracker-api.onrender.com" style="width:90%;max-width:380px;padding:10px;border:1px solid var(--border);border-radius:8px;font-size:14px;font-family:var(--font)">
      <br><br>
      <button onclick="saveApi()" style="background:var(--accent);color:#fff;border:none;border-radius:20px;padding:9px 18px;font-size:14px;font-weight:600;cursor:pointer;font-family:var(--font)">View list</button>
    </div>`;
}
function saveApi() {
  const v = document.getElementById('apiIn').value.trim();
  if (!v) return;
  API = v; localStorage.setItem(API_KEY, v); load();
}
function renderError(msg) {
  document.getElementById('root').innerHTML = `
    <div class="header"><h1>My <span>K-Drama</span> Years 🌸</h1></div>
    <div class="empty-state"><div class="emoji">😔</div><p>${esc(msg)}</p></div>`;
}

function seedRecForm() {
  // Called after render() to ensure a fresh first row appears
  recRowSeq = 0;
  const wrap = document.getElementById('r-rows');
  if (wrap && wrap.children.length === 0) addRecRow();
}

function render() {
  const dramas = DATA.dramas || [];
  const watched = dramas.filter(d => d.status === 'Watched');
  const watching = dramas.filter(d => d.status === 'Watching');
  const want = dramas.filter(d => d.status === 'Want to Watch');

  let visible;
  if (currentFilter === 'watching') visible = watching;
  else if (currentFilter === 'want') visible = want;
  else if (currentFilter === 'favorites') visible = dramas.filter(d => d.favorite);
  else visible = watched;

  visible = visible.slice().sort((a,b) => (b.dateFinished||'').localeCompare(a.dateFinished||''));

  const updated = DATA.updated_at ? new Date(DATA.updated_at).toLocaleDateString() : '';

  const favCount = dramas.filter(d => d.favorite).length;

  document.getElementById('root').innerHTML = `
    <div class="header">
      <h1>My <span>K-Drama</span> Years 🌸</h1>
      <div class="sub">${updated ? 'Last updated ' + updated : ''}</div>
      <div class="stats">
        <div class="stat ${currentFilter==='all'?'on':''}" onclick="setFilter('all')"><b>${watched.length}</b><div class="lbl">Watched</div></div>
        <div class="stat ${currentFilter==='watching'?'on':''}" onclick="setFilter('watching')"><b>${watching.length}</b><div class="lbl">Watching</div></div>
        <div class="stat ${currentFilter==='want'?'on':''}" onclick="setFilter('want')"><b>${want.length}</b><div class="lbl">Want to Watch</div></div>
        <div class="stat ${currentFilter==='favorites'?'on':''}" onclick="setFilter('favorites')"><b>${favCount}</b><div class="lbl">❤️ Favorites</div></div>
      </div>
    </div>
    ${recformHtml()}
    ${recentRecsHtml()}
    ${visible.length === 0 ? '<div class="empty-state" id="list-anchor"><div class="emoji">📺</div>Nothing here yet.</div>' : `
      <div class="grid" id="list-anchor">
        ${visible.map(cardHtml).join('')}
      </div>`}
    <div class="foot">A read-only share from <a href="https://lvelocci-home.github.io/kdrama-tracker/">My K-Drama Years</a></div>
  `;
  seedRecForm();
}

function setFilter(f) {
  currentFilter = f;
  render();
  setTimeout(() => {
    const el = document.getElementById('list-anchor');
    if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }, 50);
}

function scrollToRecommend() {
  const el = document.querySelector('.recform');
  if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

window.addEventListener('scroll', () => {
  const btn = document.getElementById('scroll-rec');
  if (!btn) return;
  btn.style.display = window.scrollY > 600 ? 'flex' : 'none';
}, { passive: true });

function recformHtml() {
  return `<div class="recform">
    <h2>📥 Recommend a drama</h2>
    <div class="hint">Send me something you think I'd love. Add as many as you want — I'll see them next time I open the app.</div>
    <div class="rcard">
      <form onsubmit="submitRec(event)">
        <div class="rfield"><label>Your name *</label><input id="r-by" maxlength="80" required></div>
        <div id="r-rows"></div>
        <button type="button" class="r-addmore" onclick="addRecRow()">+ Add another drama</button>
        <button type="submit" class="rsubmit" id="r-submit">Send recommendation${''}</button>
        <div id="r-thanks"></div>
      </form>
    </div>
  </div>`;
}

let recRowSeq = 0;
function addRecRow() {
  recRowSeq++;
  const idx = recRowSeq;
  const wrap = document.getElementById('r-rows');
  const div = document.createElement('div');
  div.className = 'r-row';
  div.dataset.idx = idx;
  div.innerHTML = `
    <div class="r-row-head">
      <span class="r-row-num">Drama ${wrap.children.length + 1}</span>
      <button type="button" class="r-remove" onclick="removeRecRow(${idx})" aria-label="Remove">×</button>
    </div>
    <div class="rfield"><label>Title *</label><input class="r-title-in" maxlength="200" required></div>
    <div class="rfield"><label>Why (optional)</label><textarea class="r-notes-in" maxlength="1000" placeholder="Funny / heart-wrenching / great chemistry…"></textarea></div>
    <div class="rfield"><label>Where to watch (optional)</label><input class="r-service-in" maxlength="60" placeholder="Netflix, Viki, etc."></div>
  `;
  wrap.appendChild(div);
  refreshRecRowNums();
  div.querySelector('.r-title-in').focus();
}

function removeRecRow(idx) {
  const row = document.querySelector(`.r-row[data-idx="${idx}"]`);
  if (!row) return;
  if (document.querySelectorAll('.r-row').length <= 1) return; // never remove the last
  row.remove();
  refreshRecRowNums();
}

function refreshRecRowNums() {
  document.querySelectorAll('.r-row').forEach((row, i) => {
    const head = row.querySelector('.r-row-num');
    if (head) head.textContent = 'Drama ' + (i + 1);
    const rm = row.querySelector('.r-remove');
    if (rm) rm.style.display = document.querySelectorAll('.r-row').length > 1 ? 'inline-block' : 'none';
  });
}

function recentRecsHtml() {
  const refs = (DATA && DATA.referrals) || [];
  if (!refs.length) return '';
  return `<div class="recent-recs">
    <h3>Recent recommendations</h3>
    ${refs.slice(0, 8).map(r => `<div class="rrow">
      <b>${esc(r.title)}</b> <span class="who">— ${esc(r.recommendedBy)}</span>
      ${r.notes ? `<div class="why">${esc(r.notes)}</div>` : ''}
    </div>`).join('')}
  </div>`;
}

async function submitRec(ev) {
  ev.preventDefault();
  const recommendedBy = document.getElementById('r-by').value.trim();
  const rows = [...document.querySelectorAll('.r-row')].map(r => ({
    title: r.querySelector('.r-title-in').value.trim(),
    notes: r.querySelector('.r-notes-in').value.trim(),
    service: r.querySelector('.r-service-in').value.trim(),
  })).filter(r => r.title);
  if (!recommendedBy || rows.length === 0) return;
  const btn = document.getElementById('r-submit');
  const thanks = document.getElementById('r-thanks');
  btn.disabled = true; btn.textContent = 'Sending…';
  try {
    let failed = 0;
    for (const row of rows) {
      const r = await fetch(API.replace(/\/$/,'') + '/api/share/' + encodeURIComponent(token) + '/referrals', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ title: row.title, recommendedBy, notes: row.notes, service: row.service })
      });
      if (!r.ok) failed++;
    }
    if (failed === rows.length) throw new Error('all failed');
    const ok = rows.length - failed;
    thanks.innerHTML = `<div class="rthanks">Thanks! Sent ${ok} ${ok === 1 ? 'recommendation' : 'recommendations'}. 🌸</div>`;
    // Reset rows
    document.getElementById('r-rows').innerHTML = '';
    addRecRow();
    setTimeout(load, 800);
  } catch (e) {
    thanks.innerHTML = '<div class="rthanks" style="background:#faeaea;color:#8a3a3a">Could not send. Try again in a moment.</div>';
  } finally {
    btn.disabled = false; btn.textContent = 'Send recommendation';
  }
}

function cardHtml(d) {
  const cats = (d.categories||[]).slice(0,4).map(c => `<span class="tag cat">${esc(c)}</span>`).join('');
  const metaParts = [];
  if (d.service) metaParts.push('📺 ' + esc(d.service));
  if (d.dateFinished) metaParts.push('✅ ' + fmtDate(d.dateFinished));
  const meta = metaParts.join(' · ');
  return `<div class="card">
    ${d.favorite ? '<span class="heart">❤️</span>' : ''}
    <div class="title">${esc(d.title)}${d.isRewatch ? ' 🔄' : ''}</div>
    ${stars(d.rating)}
    ${meta ? `<div class="meta">${meta}</div>` : ''}
    <div class="tags">
      <span class="tag ${d.type==='Reality'?'reality':'drama'}">${esc(d.type)}</span>
      ${cats}
    </div>
  </div>`;
}

load();
</script>
</body>
</html>
